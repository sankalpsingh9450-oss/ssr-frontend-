<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSR Group Civil | Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #08111d 0%, #0c1d36 100%);
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        border: 1px solid rgba(212, 175, 55, 0.2);
        border-radius: 24px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(10px);
        padding: 32px;
        text-align: center;
      }
      h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 42px); }
      p { margin: 0; line-height: 1.7; color: rgba(255,255,255,0.78); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&rsquo;re offline</h1>
      <p>SSR Group Civil is still available once your connection returns. Please reconnect to load project galleries, forms, and live lead support.</p>
    </div>
  </body>
</html>
